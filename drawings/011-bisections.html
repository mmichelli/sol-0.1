<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Wall Drawing 011</title>
<script src="https://cdn.jsdelivr.net/npm/p5@1.9.4/lib/p5.min.js"></script>
<script>if (window.self !== window.top || location.search.includes('embed')) document.documentElement.classList.add('embedded');</script>
<link rel="icon" type="image/svg+xml" href="../favicon.svg">
<link rel="stylesheet" href="shared.css">
</head>
<body>
<div class="card">
  <h1>#011</h1>
  <p>A line drawn across the page at any angle; a second line perpendicular to it, passing through its midpoint; a third perpendicular to the second through its midpoint; continuing for forty lines.</p>
  <p class="strategy" id="strategy"></p>
</div>
<div class="holder" id="h"></div>
<script>
const solutions = [
  { strategy: null, draw: (p) => {
    const W = p.width, H = p.height;
    p.stroke(20); p.strokeWeight(1.2);
    let a = p.random(p.TWO_PI);
    let cx = W/2 + p.random(-100, 100), cy = H/2 + p.random(-100, 100);
    let len = Math.min(W,H) * 0.9;
    for (let i = 0; i < 40; i++) {
      const hx = Math.cos(a)*len/2, hy = Math.sin(a)*len/2;
      p.line(cx - hx, cy - hy, cx + hx, cy + hy);
      const t = p.random(-0.35, 0.35);
      cx = cx + hx * t * 2;
      cy = cy + hy * t * 2;
      a += Math.PI/2;
      len *= 0.94;
    }
  }},
  { strategy: "What to increase? What to reduce?", draw: (p) => {
    const W = p.width, H = p.height;
    p.stroke(20); p.strokeWeight(0.4);
    let a = p.random(p.TWO_PI);
    let cx = W/2 + p.random(-100, 100), cy = H/2 + p.random(-100, 100);
    let len = Math.min(W,H) * 1.2;
    for (let i = 0; i < 200; i++) {
      const hx = Math.cos(a)*len/2, hy = Math.sin(a)*len/2;
      p.line(cx - hx, cy - hy, cx + hx, cy + hy);
      const t = p.random(-0.35, 0.35);
      cx = cx + hx * t * 2;
      cy = cy + hy * t * 2;
      a += Math.PI/2;
      len *= 0.98;
    }
  }},
  { strategy: "Where is the edge?", draw: (p) => {
    const W = p.width, H = p.height;
    p.stroke(20); p.strokeWeight(1.2);
    let a = p.random(p.TWO_PI);
    let cx = W/2 + p.random(-100, 100), cy = H/2 + p.random(-100, 100);
    let len = Math.hypot(W,H) * 1.6;
    for (let i = 0; i < 40; i++) {
      const hx = Math.cos(a)*len/2, hy = Math.sin(a)*len/2;
      p.line(cx - hx, cy - hy, cx + hx, cy + hy);
      const t = p.random(-0.35, 0.35);
      cx = cx + hx * t * 2;
      cy = cy + hy * t * 2;
      a += Math.PI/2;
      len *= 0.94;
    }
  }},
  { strategy: "Short circuit", draw: (p) => {
    const W = p.width, H = p.height;
    p.stroke(20); p.strokeWeight(1.2);
    let a = p.random(p.TWO_PI);
    let cx = W/2 + p.random(-100, 100), cy = H/2 + p.random(-100, 100);
    let len = Math.min(W,H) * 0.9;
    for (let i = 0; i < 8; i++) {
      const hx = Math.cos(a)*len/2, hy = Math.sin(a)*len/2;
      p.line(cx - hx, cy - hy, cx + hx, cy + hy);
      const t = p.random(-0.35, 0.35);
      cx = cx + hx * t * 2;
      cy = cy + hy * t * 2;
      a += Math.PI/2;
      len *= 0.94;
    }
  }},
];
</script>
<script src="runner.js"></script>
</body>
</html>
