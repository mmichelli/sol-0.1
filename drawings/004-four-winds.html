<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Wall Drawing 004</title>
<script src="https://cdn.jsdelivr.net/npm/p5@1.9.4/lib/p5.min.js"></script>
<script>if (window.self !== window.top || location.search.includes('embed')) document.documentElement.classList.add('embedded');</script>
<link rel="icon" type="image/svg+xml" href="../favicon.svg">
<link rel="stylesheet" href="shared.css">
</head>
<body>
<div class="card">
  <h1>#004</h1>
  <p>Forty straight lines from each of the four corners toward the opposite edges; the lines from the upper-left corner red, from the upper-right yellow, from the lower-right blue, from the lower-left black.</p>
  <p class="strategy" id="strategy"></p>
</div>
<div class="holder" id="h"></div>
<script>
const solutions = [
  { strategy: null, draw: (p) => {
    const W = p.width, H = p.height;
    const corners = [
      { o:[0,0],     a0: 0,           a1: Math.PI/2,     col:[200,40,40] },
      { o:[W,0],     a0: Math.PI/2,   a1: Math.PI,       col:[240,200,40] },
      { o:[W,H],     a0: Math.PI,     a1: 3*Math.PI/2,   col:[40,80,200] },
      { o:[0,H],     a0: 3*Math.PI/2, a1: 2*Math.PI,     col:[20,20,20] },
    ];
    p.strokeWeight(1);
    for (const k of corners) {
      p.stroke(k.col[0], k.col[1], k.col[2], 180);
      for (let i = 0; i < 40; i++) {
        const t = i/39;
        const a = k.a0 + (k.a1 - k.a0)*t;
        const d = Math.hypot(W,H);
        p.line(k.o[0], k.o[1], k.o[0]+Math.cos(a)*d, k.o[1]+Math.sin(a)*d);
      }
    }
  }},
  { strategy: "Use an unacceptable colour", draw: (p) => {
    const W = p.width, H = p.height;
    const corners = [
      { o:[0,0],     a0: 0,           a1: Math.PI/2 },
      { o:[W,0],     a0: Math.PI/2,   a1: Math.PI },
      { o:[W,H],     a0: Math.PI,     a1: 3*Math.PI/2 },
      { o:[0,H],     a0: 3*Math.PI/2, a1: 2*Math.PI },
    ];
    p.strokeWeight(1);
    p.stroke(255, 105, 180, 180);
    for (const k of corners) {
      for (let i = 0; i < 40; i++) {
        const t = i/39;
        const a = k.a0 + (k.a1 - k.a0)*t;
        const d = Math.hypot(W,H);
        p.line(k.o[0], k.o[1], k.o[0]+Math.cos(a)*d, k.o[1]+Math.sin(a)*d);
      }
    }
  }},
  { strategy: "Lowest common denominator", draw: (p) => {
    const W = p.width, H = p.height;
    const corners = [
      { o:[0,0],     a0: 0,           a1: Math.PI/2 },
      { o:[W,0],     a0: Math.PI/2,   a1: Math.PI },
      { o:[W,H],     a0: Math.PI,     a1: 3*Math.PI/2 },
      { o:[0,H],     a0: 3*Math.PI/2, a1: 2*Math.PI },
    ];
    p.strokeWeight(1);
    p.stroke(130, 130, 130, 180);
    for (const k of corners) {
      for (let i = 0; i < 40; i++) {
        const t = i/39;
        const a = k.a0 + (k.a1 - k.a0)*t;
        const d = Math.hypot(W,H);
        p.line(k.o[0], k.o[1], k.o[0]+Math.cos(a)*d, k.o[1]+Math.sin(a)*d);
      }
    }
  }},
  { strategy: "Spectrum analysis", draw: (p) => {
    const W = p.width, H = p.height;
    const corners = [
      { o:[0,0],     a0: 0,           a1: Math.PI/2 },
      { o:[W,0],     a0: Math.PI/2,   a1: Math.PI },
      { o:[W,H],     a0: Math.PI,     a1: 3*Math.PI/2 },
      { o:[0,H],     a0: 3*Math.PI/2, a1: 2*Math.PI },
    ];
    p.colorMode(p.HSB, 360, 100, 100, 255);
    p.strokeWeight(1);
    for (let ci = 0; ci < corners.length; ci++) {
      const k = corners[ci];
      for (let i = 0; i < 40; i++) {
        const t = i/39;
        const a = k.a0 + (k.a1 - k.a0)*t;
        const d = Math.hypot(W,H);
        const hue = ((ci*90) + t*90) % 360;
        p.stroke(hue, 80, 90, 180);
        p.line(k.o[0], k.o[1], k.o[0]+Math.cos(a)*d, k.o[1]+Math.sin(a)*d);
      }
    }
    p.colorMode(p.RGB, 255);
  }},
];
</script>
<script src="runner.js"></script>
</body>
</html>
