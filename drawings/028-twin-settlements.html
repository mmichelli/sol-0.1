<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Wall Drawing 028</title>
<script src="https://cdn.jsdelivr.net/npm/p5@1.9.4/lib/p5.min.js"></script>
<script>if (window.self !== window.top || location.search.includes('embed')) document.documentElement.classList.add('embedded');</script>
<link rel="icon" type="image/svg+xml" href="../favicon.svg">
<link rel="stylesheet" href="shared.css">
</head>
<body>
<div class="card">
  <h1>#028</h1>
  <p>Two points placed on the horizontal centre line, one quarter of the way in from each edge. From each point, fifty concentric arcs expanding outward. Where the arcs of one meet the arcs of the other, a small black dot.</p>
  <p class="source">Inspired by Wikipedia: <em>Glen Afton</em> — "twin settlements… 14 km apart."</p>
  <p class="strategy" id="strategy"></p>
</div>
<div class="holder" id="h"></div>
<script>
function renderTwo(p, a, b, step, N) {
  p.noFill(); p.stroke(20); p.strokeWeight(1);
  for (let i = 1; i <= N; i++) {
    p.circle(a[0], a[1], i*step*2);
    p.circle(b[0], b[1], i*step*2);
  }
  p.fill(20); p.noStroke();
  const d = Math.hypot(a[0]-b[0], a[1]-b[1]);
  for (let i = 1; i <= N; i++) for (let j = 1; j <= N; j++) {
    const ra = i*step, rb = j*step;
    if (ra + rb < d || Math.abs(ra - rb) > d) continue;
    const x = (d*d + ra*ra - rb*rb) / (2*d);
    const h = Math.sqrt(Math.max(0, ra*ra - x*x));
    const mx = a[0] + x*(b[0]-a[0])/d, my = a[1] + x*(b[1]-a[1])/d;
    const rx = -(b[1]-a[1])/d, ry = (b[0]-a[0])/d;
    p.circle(mx + rx*h, my + ry*h, 4);
    if (h > 0.5) p.circle(mx - rx*h, my - ry*h, 4);
  }
}
const solutions = [
  { strategy: null, draw: (p) => renderTwo(p, [p.width*0.25, p.height/2], [p.width*0.75, p.height/2], 12, 50) },
  { strategy: "What mistakes did you make last time?", draw: (p) => {
    const off = p.random(60, 200);
    renderTwo(p, [p.width/2 - off, p.height*0.35 + p.random(-60,60)], [p.width/2 + off, p.height*0.65 + p.random(-60,60)], 14, 42);
  }},
  { strategy: "Just carry on", draw: (p) => {
    const a = [p.width*0.25, p.height/2], b = [p.width*0.75, p.height/2];
    p.noFill(); p.stroke(20); p.strokeWeight(1);
    for (let i = 1; i <= 200; i++) {
      p.circle(a[0], a[1], i*12*2);
      p.circle(b[0], b[1], i*12*2);
    }
  }},
  { strategy: "Give way to your worst impulse", draw: (p) => {
    const W = p.width, H = p.height, N = 20, step = 20;
    const centres = [];
    for (let i = 0; i < 8; i++) centres.push([p.random(W), p.random(H)]);
    p.noFill(); p.stroke(20); p.strokeWeight(1);
    for (const c of centres) {
      for (let i = 1; i <= N; i++) p.circle(c[0], c[1], i*step*2);
    }
    p.fill(20); p.noStroke();
    for (let ci = 0; ci < centres.length; ci++) for (let cj = ci+1; cj < centres.length; cj++) {
      const a = centres[ci], b = centres[cj];
      const d = Math.hypot(a[0]-b[0], a[1]-b[1]);
      for (let i = 1; i <= N; i++) for (let j = 1; j <= N; j++) {
        const ra = i*step, rb = j*step;
        if (ra + rb < d || Math.abs(ra - rb) > d) continue;
        const x = (d*d + ra*ra - rb*rb) / (2*d);
        const h = Math.sqrt(Math.max(0, ra*ra - x*x));
        const mx = a[0] + x*(b[0]-a[0])/d, my = a[1] + x*(b[1]-a[1])/d;
        const rx = -(b[1]-a[1])/d, ry = (b[0]-a[0])/d;
        p.circle(mx + rx*h, my + ry*h, 4);
        if (h > 0.5) p.circle(mx - rx*h, my - ry*h, 4);
      }
    }
  }},
];
</script>
<script src="runner.js"></script>
</body>
</html>
