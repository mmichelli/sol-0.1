<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Wall Drawing 069</title>
<script src="https://cdn.jsdelivr.net/npm/p5@1.9.4/lib/p5.min.js"></script>
<script>if (window.self !== window.top || location.search.includes('embed')) document.documentElement.classList.add('embedded');</script>
<link rel="icon" type="image/svg+xml" href="../favicon.svg">
<link rel="stylesheet" href="shared.css">
</head>
<body>
<div class="card">
  <h1>#069</h1>
  <p>A row of triangular prisms standing on their bases across the page, each of a different height. Drawn in black isometric lines, as an architect's proposal for a row of buildings.</p>
  <p class="source">Seed — <em>proposal</em>: an offer; terms or conditions proposed; to put forth proposals for a building.</p>
  <p class="strategy" id="strategy"></p>
</div>
<div class="holder" id="h"></div>
<script>
const C30 = Math.cos(Math.PI/6), S30 = 0.5;
function iso(x, y, z) { return [(x - z) * C30, (x + z) * S30 - y]; }
function prism(p, ox, oy, w, d, h) {
  // triangular prism: base is an isoceles triangle in x-z plane, extruded upward in y
  const hw = w/2;
  const verts = [
    iso(-hw, 0, 0), iso( hw, 0, 0), iso(0, 0, d),
    iso(-hw, h, 0), iso( hw, h, 0), iso(0, h, d),
  ].map(([a,b]) => [a+ox, b+oy]);
  const E = [[0,1],[1,2],[2,0],[3,4],[4,5],[5,3],[0,3],[1,4],[2,5]];
  for (const [a,b] of E) p.line(verts[a][0], verts[a][1], verts[b][0], verts[b][1]);
}
const solutions = [
  { strategy: null, draw: (p) => {
    const W=p.width, H=p.height;
    p.stroke(20); p.strokeWeight(1.1); p.noFill();
    const N = 6;
    const baseY = H*0.72;
    const margin = 60;
    const spacing = (W - 2*margin) / N;
    for (let i=0; i<N; i++) {
      const ox = margin + spacing*(i + 0.5);
      const w = spacing * 0.55;
      const d = w * 0.7;
      const h = p.random(120, 280);
      prism(p, ox, baseY, w, d, h);
    }
  }},
  { strategy: "Cascades", draw: (p) => {
    const W=p.width, H=p.height;
    p.stroke(20); p.strokeWeight(1.1); p.noFill();
    const N = 6;
    const margin = 60;
    const spacing = (W - 2*margin) / N;
    for (let i=0; i<N; i++) {
      const ox = margin + spacing*(i + 0.5);
      const baseY = 120 + i * 70;
      const w = spacing * 0.55;
      const d = w * 0.7;
      const h = 160 - i * 16;
      prism(p, ox, baseY, w, d, h);
    }
  }},
  { strategy: "Turn it upside down", draw: (p) => {
    const W=p.width, H=p.height;
    p.stroke(20); p.strokeWeight(1.1); p.noFill();
    const N = 6;
    const baseY = H*0.28;
    const margin = 60;
    const spacing = (W - 2*margin) / N;
    for (let i=0; i<N; i++) {
      const ox = margin + spacing*(i + 0.5);
      const w = spacing * 0.55;
      const d = w * 0.7;
      const h = p.random(120, 280);
      // hanging prism: extrude downward by using negative h
      prism(p, ox, baseY, w, d, -h);
    }
  }},
];
</script>
<script src="runner.js"></script>
</body>
</html>
