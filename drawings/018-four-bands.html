<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Wall Drawing 018</title>
<script src="https://cdn.jsdelivr.net/npm/p5@1.9.4/lib/p5.min.js"></script>
<script>if (window.self !== window.top || location.search.includes('embed')) document.documentElement.classList.add('embedded');</script>
<link rel="icon" type="image/svg+xml" href="../favicon.svg">
<link rel="stylesheet" href="shared.css">
</head>
<body>
<div class="card">
  <h1>#018</h1>
  <p>Four equal horizontal bands across the page. The first band filled with red parallel lines, the second with yellow, the third with blue, the fourth with black. The angle of the lines in each band is chosen by the toss of a coin.</p>
  <p class="strategy" id="strategy"></p>
</div>
<div class="holder" id="h"></div>
<script>
function clipLine(x1,y1,x2,y2,xmin,ymin,xmax,ymax) {
  function code(x,y) { let c=0; if (x<xmin)c|=1; if (x>xmax)c|=2; if (y<ymin)c|=4; if (y>ymax)c|=8; return c; }
  let c1 = code(x1,y1), c2 = code(x2,y2);
  while (true) {
    if (!(c1|c2)) return [x1,y1,x2,y2];
    if (c1 & c2) return null;
    const c = c1 || c2; let x, y;
    if (c & 8) { x = x1 + (x2-x1)*(ymax-y1)/(y2-y1); y = ymax; }
    else if (c & 4) { x = x1 + (x2-x1)*(ymin-y1)/(y2-y1); y = ymin; }
    else if (c & 2) { y = y1 + (y2-y1)*(xmax-x1)/(x2-x1); x = xmax; }
    else { y = y1 + (y2-y1)*(xmin-x1)/(x2-x1); x = xmin; }
    if (c === c1) { x1=x; y1=y; c1=code(x1,y1); } else { x2=x; y2=y; c2=code(x2,y2); }
  }
}
function drawBands(p, palette) {
  const W = p.width, H = p.height, bandH = H/4;
  p.strokeWeight(1.2);
  for (let b = 0; b < 4; b++) {
    const col = palette[b];
    p.stroke(col[0],col[1],col[2]);
    const y0 = b * bandH, y1 = y0 + bandH;
    const angle = p.random([0, Math.PI/4, Math.PI/2, -Math.PI/4]);
    const spacing = 6;
    const diag = Math.hypot(W, bandH);
    const nx = Math.cos(angle + Math.PI/2), ny = Math.sin(angle + Math.PI/2);
    const cx = W/2, cy = (y0+y1)/2;
    for (let i = -diag; i < diag; i += spacing) {
      const mx = cx + nx*i, my = cy + ny*i;
      const dx = Math.cos(angle)*diag, dy = Math.sin(angle)*diag;
      const clipped = clipLine(mx - dx, my - dy, mx + dx, my + dy, 0, y0, W, y1);
      if (clipped) p.line(clipped[0], clipped[1], clipped[2], clipped[3]);
    }
  }
}
const solutions = [
  { strategy: null, draw: (p) => drawBands(p, [[200,40,40],[240,200,40],[40,80,200],[20,20,20]]) },
  { strategy: "Mute and continue", draw: (p) => drawBands(p, [[220,220,220],[170,170,170],[110,110,110],[40,40,40]]) },
  { strategy: "Is there something missing?", draw: (p) => {
    const W = p.width, H = p.height, bandH = H/4;
    const palette = [[200,40,40],[240,200,40],[40,80,200],[20,20,20]];
    const skip = Math.floor(p.random(4));
    p.strokeWeight(1.2);
    for (let b = 0; b < 4; b++) {
      if (b === skip) continue;
      const col = palette[b];
      p.stroke(col[0],col[1],col[2]);
      const y0 = b * bandH, y1 = y0 + bandH;
      const angle = p.random([0, Math.PI/4, Math.PI/2, -Math.PI/4]);
      const spacing = 6;
      const diag = Math.hypot(W, bandH);
      const nx = Math.cos(angle + Math.PI/2), ny = Math.sin(angle + Math.PI/2);
      const cx = W/2, cy = (y0+y1)/2;
      for (let i = -diag; i < diag; i += spacing) {
        const mx = cx + nx*i, my = cy + ny*i;
        const dx = Math.cos(angle)*diag, dy = Math.sin(angle)*diag;
        const clipped = clipLine(mx - dx, my - dy, mx + dx, my + dy, 0, y0, W, y1);
        if (clipped) p.line(clipped[0], clipped[1], clipped[2], clipped[3]);
      }
    }
  }},
  { strategy: "Change instrument roles", draw: (p) => drawBands(p, [[20,20,20],[40,80,200],[240,200,40],[200,40,40]]) },
];
</script>
<script src="runner.js"></script>
</body>
</html>
