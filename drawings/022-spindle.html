<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Wall Drawing 022</title>
<script src="https://cdn.jsdelivr.net/npm/p5@1.9.4/lib/p5.min.js"></script>
<script>if (window.self !== window.top || location.search.includes('embed')) document.documentElement.classList.add('embedded');</script>
<link rel="icon" type="image/svg+xml" href="../favicon.svg">
<link rel="stylesheet" href="shared.css">
</head>
<body>
<div class="card">
  <h1>#022</h1>
  <p>A spiral drawn from the centre of the page, completing twenty revolutions outward. Along its length, black dots placed at regular angular intervals, each dot larger than the last.</p>
  <p class="source">Inspired by Wikipedia: <em>Granulifusus balbus</em> — a marine spindle snail.</p>
  <p class="strategy" id="strategy"></p>
</div>
<button onclick="location.reload()">Re-render</button>
<div class="holder" id="h"></div>
<script>
const solutions = [
  { strategy: null, draw: (p) => {
    const cx = p.width/2, cy = p.height/2;
    p.noFill(); p.stroke(20); p.strokeWeight(1);
    const turns = 20, steps = 2000, rMax = Math.min(p.width, p.height)/2 - 30;
    p.beginShape();
    for (let i = 0; i <= steps; i++) {
      const t = i/steps;
      const a = t * turns * p.TWO_PI + p.random(-0.01, 0.01);
      const r = t * rMax;
      p.vertex(cx + Math.cos(a)*r, cy + Math.sin(a)*r);
    }
    p.endShape();
    p.noStroke(); p.fill(20);
    for (let i = 0; i < turns*8; i++) {
      const t = i/(turns*8);
      const a = t * turns * p.TWO_PI;
      const r = t * rMax;
      p.circle(cx + Math.cos(a)*r, cy + Math.sin(a)*r, 1 + t*16);
    }
  }},
  { strategy: "Look closely at the most embarrassing details and amplify", draw: (p) => {
    const cx = p.width/2, cy = p.height/2;
    p.noStroke(); p.fill(20, 180);
    const turns = 6, dots = turns*12, rMax = Math.min(p.width, p.height)/2 - 30;
    for (let i = 0; i < dots; i++) {
      const t = i/dots;
      const a = t * turns * p.TWO_PI;
      const r = t * rMax;
      p.circle(cx + Math.cos(a)*r, cy + Math.sin(a)*r, 20 + t*120);
    }
  }},
];
</script>
<script src="runner.js"></script>
</body>
</html>
