<body>
<div class="card">
  <h1>#048</h1>
  <p>At the centre of the page, three primary shapes overlapping: a red circle, a yellow square, a blue triangle. Where any two shapes overlap, a fourth flat colour. Where all three meet, black.</p>
  <p class="source">Seed — <em>archetypal</em>: pertaining to an archetype; consisting a model or pattern; original.</p>
  <p class="strategy" id="strategy"></p>
</div>
<button onclick="location.reload()">Re-render</button>
<div class="holder" id="h"></div>
<script>
// Using p5.Graphics for mask-based composition
function compose(p, offset) {
  const W = p.width, H = p.height;
  const cx = W/2, cy = H/2, R = 200;
  const offs = offset || [[0,0],[0,0],[0,0]];
  const mkMask = (fn) => { const g = p.createGraphics(W, H); g.noStroke(); g.fill(255); fn(g); return g; };
  const circ = mkMask(g => g.circle(cx + offs[0][0], cy + offs[0][1], R*2));
  const sq   = mkMask(g => { g.rectMode(p.CENTER); g.rect(cx + offs[1][0], cy + offs[1][1], R*1.7, R*1.7); });
  const tri  = mkMask(g => {
    const [dx, dy] = offs[2];
    const tR = R*1.1;
    g.triangle(cx+dx, cy+dy - tR, cx+dx - tR*0.866, cy+dy + tR*0.5, cx+dx + tR*0.866, cy+dy + tR*0.5);
  });
  // Inspect each pixel of the three masks and paint
  circ.loadPixels(); sq.loadPixels(); tri.loadPixels();
  const out = p.createGraphics(W, H);
  out.loadPixels();
  const idx = (x, y) => (y*W + x) * 4;
  const isOn = (buf, x, y) => buf.pixels[idx(x,y)+3] > 100;
  const PAL = {
    "100": [200,40,40], "010": [240,200,40], "001": [40,80,200],
    "110": [230,110,40], "101": [120,60,140], "011": [40,140,70],
    "111": [20,20,20], "000": [255,255,255]
  };
  for (let y = 0; y < H; y++) {
    for (let x = 0; x < W; x++) {
      const key = (isOn(circ,x,y)?"1":"0") + (isOn(sq,x,y)?"1":"0") + (isOn(tri,x,y)?"1":"0");
      const col = PAL[key];
      const i = idx(x, y);
      out.pixels[i] = col[0]; out.pixels[i+1] = col[1]; out.pixels[i+2] = col[2]; out.pixels[i+3] = 255;
    }
  }
  out.updatePixels();
  p.image(out, 0, 0);
}
const solutions = [
  { strategy: null, draw: (p) => {
    const R = 180;
    compose(p, [[-90, 40], [70, 40], [0, -100]]);
  }},
  { strategy: "Turn it upside down", draw: (p) => {
    compose(p, [[-90, -40], [70, -40], [0, 100]]);
  }},
  { strategy: "Remove specifics and convert to ambiguities", draw: (p) => {
    // three shapes drifted apart; overlaps minimal
    compose(p, [[-180, 0], [180, 0], [0, -180]]);
  }},
];
</script>
