<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Wall Drawing 051</title>
<script src="https://cdn.jsdelivr.net/npm/p5@1.9.4/lib/p5.min.js"></script>
<script>if (window.self !== window.top || location.search.includes('embed')) document.documentElement.classList.add('embedded');</script>
<link rel="icon" type="image/svg+xml" href="../favicon.svg">
<link rel="stylesheet" href="shared.css">
</head>
<body>
<div class="card">
  <h1>#051</h1>
  <p>Many straight lines drawn at many angles across the page. No line touches any other; where two would meet, the second is drawn shorter, withdrawing before the point of contact.</p>
  <p class="source">Seed — <em>eloign</em>: to remove afar off; to withdraw.</p>
  <p class="strategy" id="strategy"></p>
</div>
<div class="holder" id="h"></div>
<script>
function segInt(a,b,c,d,e,f,g,h) {
  const rx=c-a, ry=d-b, sx=g-e, sy=h-f, D=rx*sy-ry*sx;
  if (Math.abs(D)<1e-9) return null;
  const t=((e-a)*sy-(f-b)*sx)/D, u=((e-a)*ry-(f-b)*rx)/D;
  return (t>=0&&t<=1&&u>=0&&u<=1) ? t : null;
}
function nonTouching(p, target, maxLen) {
  const W=p.width, H=p.height, L=[];
  for (let tries=0; tries<8000 && L.length<target; tries++) {
    const a=p.random(p.PI), len=p.random(60, maxLen);
    const mx=p.random(30, W-30), my=p.random(30, H-30);
    const ax=mx-Math.cos(a)*len/2, ay=my-Math.sin(a)*len/2;
    const bx=mx+Math.cos(a)*len/2, by=my+Math.sin(a)*len/2;
    if (ax<20||ax>W-20||bx<20||bx>W-20||ay<20||ay>H-20||by<20||by>H-20) continue;
    let ok=true;
    for (const s of L) if (segInt(ax,ay,bx,by,s[0],s[1],s[2],s[3])!==null) { ok=false; break; }
    if (ok) L.push([ax,ay,bx,by]);
  }
  return L;
}
const solutions = [
  { strategy: null, draw: (p) => {
    const L = nonTouching(p, 85, 320);
    p.stroke(20); p.strokeWeight(1.1);
    for (const [a,b,c,d] of L) p.line(a,b,c,d);
  }},
  { strategy: "Faced with a choice, do both", draw: (p) => {
    const L = nonTouching(p, 55, 260);
    p.stroke(20, 45); p.strokeWeight(0.6);
    for (const [a,b,c,d] of L) {
      const dx=c-a, dy=d-b, Lg=Math.hypot(dx,dy), ux=dx/Lg, uy=dy/Lg;
      p.line(a-ux*600, b-uy*600, c+ux*600, d+uy*600);
    }
    p.stroke(20); p.strokeWeight(1.3);
    for (const [a,b,c,d] of L) p.line(a,b,c,d);
  }},
  { strategy: "Ghost echoes", draw: (p) => {
    const L = nonTouching(p, 55, 280);
    p.stroke(20); p.strokeWeight(1.2);
    for (const [a,b,c,d] of L) p.line(a,b,c,d);
    p.stroke(20, 70); p.strokeWeight(0.7);
    for (const [a,b,c,d] of L) {
      const dx=c-a, dy=d-b, Lg=Math.hypot(dx,dy), nx=-dy/Lg*6, ny=dx/Lg*6;
      p.line(a+nx, b+ny, c+nx, d+ny);
      p.line(a-nx, b-ny, c-nx, d-ny);
    }
  }},
];
</script>
<script src="runner.js"></script>
</body>
</html>
