<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Wall Drawing 015</title>
<script src="https://cdn.jsdelivr.net/npm/p5@1.9.4/lib/p5.min.js"></script>
<script>if (window.self !== window.top || location.search.includes('embed')) document.documentElement.classList.add('embedded');</script>
<link rel="icon" type="image/svg+xml" href="../favicon.svg">
<link rel="stylesheet" href="shared.css">
</head>
<body>
<div class="card">
  <h1>#015</h1>
  <p>Fifty points placed at random on the page, evenly distributed. All of the points connected to each other by straight lines.</p>
  <p class="strategy" id="strategy"></p>
</div>
<button onclick="location.reload()">Re-render</button>
<div class="holder" id="h"></div>
<script>
function genPoints(p, N, m) {
  const W = p.width, H = p.height;
  const pts = [];
  for (let i = 0; i < N; i++) {
    let best = null, bestMin = -1;
    for (let t = 0; t < 20; t++) {
      const cand = [p.random(m, W-m), p.random(m, H-m)];
      let mn = Infinity;
      for (const q of pts) mn = Math.min(mn, Math.hypot(q[0]-cand[0], q[1]-cand[1]));
      if (mn > bestMin) { bestMin = mn; best = cand; }
    }
    pts.push(best);
  }
  return pts;
}
const solutions = [
  { strategy: null, draw: (p) => {
    const pts = genPoints(p, 50, 40);
    p.stroke(20, 60); p.strokeWeight(0.8);
    for (let i = 0; i < pts.length; i++) for (let j = i+1; j < pts.length; j++)
      p.line(pts[i][0], pts[i][1], pts[j][0], pts[j][1]);
    p.noStroke(); p.fill(20);
    for (const [x,y] of pts) p.circle(x,y,4);
  }},
  { strategy: "Courage!", draw: (p) => {
    const pts = genPoints(p, 150, 30);
    p.stroke(20, 25); p.strokeWeight(0.5);
    for (let i = 0; i < pts.length; i++) for (let j = i+1; j < pts.length; j++)
      p.line(pts[i][0], pts[i][1], pts[j][0], pts[j][1]);
    p.noStroke(); p.fill(20);
    for (const [x,y] of pts) p.circle(x,y,3);
  }},
  { strategy: "Use fewer notes", draw: (p) => {
    const pts = genPoints(p, 15, 60);
    p.stroke(20, 140); p.strokeWeight(1);
    for (let i = 0; i < pts.length; i++) for (let j = i+1; j < pts.length; j++)
      if (p.random() < 0.5) p.line(pts[i][0], pts[i][1], pts[j][0], pts[j][1]);
    p.noStroke(); p.fill(20);
    for (const [x,y] of pts) p.circle(x,y,5);
  }},
  { strategy: "Define an area as 'safe' and use it as an anchor", draw: (p) => {
    const W = p.width, H = p.height;
    const bw = W*0.2, bh = H*0.2;
    const bx0 = W/2 - bw/2, by0 = H/2 - bh/2, bx1 = bx0 + bw, by1 = by0 + bh;
    function segHitsBox(x0, y0, x1, y1) {
      const dx = x1 - x0, dy = y1 - y0;
      let t0 = 0, t1 = 1;
      const p_ = [-dx, dx, -dy, dy];
      const q_ = [x0 - bx0, bx1 - x0, y0 - by0, by1 - y0];
      for (let i = 0; i < 4; i++) {
        if (p_[i] === 0) { if (q_[i] < 0) return false; }
        else {
          const t = q_[i] / p_[i];
          if (p_[i] < 0) { if (t > t1) return false; if (t > t0) t0 = t; }
          else { if (t < t0) return false; if (t < t1) t1 = t; }
        }
      }
      return true;
    }
    const pts = genPoints(p, 50, 40);
    p.stroke(20, 60); p.strokeWeight(0.8);
    for (let i = 0; i < pts.length; i++) for (let j = i+1; j < pts.length; j++) {
      if (segHitsBox(pts[i][0], pts[i][1], pts[j][0], pts[j][1])) continue;
      p.line(pts[i][0], pts[i][1], pts[j][0], pts[j][1]);
    }
    p.noFill(); p.stroke(20, 120); p.strokeWeight(1);
    p.rect(bx0, by0, bw, bh);
    p.noStroke(); p.fill(20);
    for (const [x,y] of pts) p.circle(x,y,4);
  }},
];
</script>
<script src="runner.js"></script>
</body>
</html>
