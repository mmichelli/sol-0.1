<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Wall Drawing 019</title>
<script src="https://cdn.jsdelivr.net/npm/p5@1.9.4/lib/p5.min.js"></script>
<script>if (window.self !== window.top || location.search.includes('embed')) document.documentElement.classList.add('embedded');</script>
<link rel="icon" type="image/svg+xml" href="../favicon.svg">
<link rel="stylesheet" href="shared.css">
</head>
<body>
<div class="card">
  <h1>#019</h1>
  <p>The page divided into a grid of twelve by twelve cells. Within each cell, a circle inscribed; within each circle a second circle, its diameter a random fraction of the first.</p>
  <p class="strategy" id="strategy"></p>
</div>
<button onclick="location.reload()">Re-render</button>
<div class="holder" id="h"></div>
<script>
const solutions = [
  { strategy: null, draw: (p) => {
    const N = 12, s = p.width / N;
    p.noFill(); p.stroke(20); p.strokeWeight(1);
    for (let y=0;y<N;y++) for (let x=0;x<N;x++) {
      const cx = x*s + s/2, cy = y*s + s/2;
      p.circle(cx, cy, s*0.9);
      p.circle(cx, cy, s * p.random(0.15, 0.8));
    }
  }},
  { strategy: "Fill every beat with something", draw: (p) => {
    const N = 12, s = p.width / N;
    p.stroke(20); p.strokeWeight(1);
    for (let y=0;y<N;y++) for (let x=0;x<N;x++) {
      const cx = x*s + s/2, cy = y*s + s/2;
      p.noFill(); p.circle(cx, cy, s*0.9);
      p.circle(cx, cy, s * p.random(0.5, 0.75));
      p.circle(cx, cy, s * p.random(0.25, 0.4));
      p.line(x*s, y*s, x*s+s, y*s+s);
      p.line(x*s+s, y*s, x*s, y*s+s);
      p.fill(20); p.noStroke(); p.circle(cx, cy, 4); p.stroke(20);
    }
  }},
];
</script>
<script src="runner.js"></script>
</body>
</html>
