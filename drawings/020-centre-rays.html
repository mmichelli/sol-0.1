<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Wall Drawing 020</title>
<script src="https://cdn.jsdelivr.net/npm/p5@1.9.4/lib/p5.min.js"></script>
<script>if (window.self !== window.top || location.search.includes('embed')) document.documentElement.classList.add('embedded');</script>
<link rel="icon" type="image/svg+xml" href="../favicon.svg">
<link rel="stylesheet" href="shared.css">
</head>
<body>
<div class="card">
  <h1>#020</h1>
  <p>One thousand points placed at random across the page. From the centre of the page, a straight line drawn to each point. The lines are coloured red, yellow, blue, or black; the colour chosen by the toss of a four-sided die.</p>
  <p class="strategy" id="strategy"></p>
</div>
<button onclick="location.reload()">Re-render</button>
<div class="holder" id="h"></div>
<script>
const COLORS = [[200,40,40],[240,200,40],[40,80,200],[20,20,20]];
const solutions = [
  { strategy: null, draw: (p) => {
    const W = p.width, H = p.height, cx = W/2, cy = H/2;
    p.strokeWeight(0.6);
    for (let i = 0; i < 1000; i++) {
      const x = p.random(W), y = p.random(H);
      const col = COLORS[Math.floor(p.random(4))];
      p.stroke(col[0], col[1], col[2], 160);
      p.line(cx, cy, x, y);
    }
  }},
  { strategy: "Reverse", draw: (p) => {
    const W = p.width, H = p.height, cx = W/2, cy = H/2;
    p.strokeWeight(0.6);
    for (let i = 0; i < 1000; i++) {
      const side = Math.floor(p.random(4));
      let x, y;
      if (side === 0) { x = p.random(W); y = 0; }
      else if (side === 1) { x = W; y = p.random(H); }
      else if (side === 2) { x = p.random(W); y = H; }
      else { x = 0; y = p.random(H); }
      const col = COLORS[Math.floor(p.random(4))];
      p.stroke(col[0], col[1], col[2], 160);
      p.line(x, y, cx, cy);
    }
  }},
  { strategy: "When is it for?", draw: (p) => {
    const W = p.width, H = p.height, cx = W/2, cy = H/2;
    const r = Math.hypot(W, H)/2;
    p.strokeWeight(0.6);
    const cardinals = [-Math.PI/2, 0, Math.PI/2, Math.PI];
    for (const base of cardinals) {
      for (let i = 0; i < 120; i++) {
        const a = base + p.random(-0.08, 0.08);
        const col = COLORS[Math.floor(p.random(4))];
        p.stroke(col[0], col[1], col[2], 180);
        p.line(cx, cy, cx + Math.cos(a)*r, cy + Math.sin(a)*r);
      }
    }
    for (let i = 0; i < 120; i++) {
      const a = p.random(p.TWO_PI);
      const col = COLORS[Math.floor(p.random(4))];
      p.stroke(col[0], col[1], col[2], 100);
      p.line(cx, cy, cx + Math.cos(a)*r, cy + Math.sin(a)*r);
    }
  }},
  { strategy: "Be dirty", draw: (p) => {
    const W = p.width, H = p.height, cx = W/2, cy = H/2;
    p.noStroke();
    for (let i = 0; i < 1000; i++) {
      const x = p.random(W), y = p.random(H);
      const col = COLORS[Math.floor(p.random(4))];
      const len = Math.hypot(x - cx, y - cy);
      const dots = Math.max(6, Math.floor(len / 3));
      for (let k = 0; k < dots; k++) {
        const t = k/dots;
        const px = cx + (x - cx)*t + p.random(-2, 2);
        const py = cy + (y - cy)*t + p.random(-2, 2);
        p.fill(col[0], col[1], col[2], p.random(60, 180));
        p.circle(px, py, p.random(0.5, 1.8));
      }
    }
  }},
];
</script>
<script src="runner.js"></script>
</body>
</html>
