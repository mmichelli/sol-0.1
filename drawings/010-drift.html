<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Wall Drawing 010</title>
<script src="https://cdn.jsdelivr.net/npm/p5@1.9.4/lib/p5.min.js"></script>
<script>if (window.self !== window.top || location.search.includes('embed')) document.documentElement.classList.add('embedded');</script>
<link rel="icon" type="image/svg+xml" href="../favicon.svg">
<link rel="stylesheet" href="shared.css">
</head>
<body>
<div class="card">
  <h1>#010</h1>
  <p>Three hundred short line segments placed at random on the page, the angle of each determined by its position; segments in the upper half blue, segments in the lower half yellow.</p>
  <p class="strategy" id="strategy"></p>
</div>
<button onclick="location.reload()">Re-render</button>
<div class="holder" id="h"></div>
<script>
const solutions = [
  { strategy: null, draw: (p) => {
    const W = p.width, H = p.height;
    p.strokeWeight(2);
    for (let i = 0; i < 300; i++) {
      const x = p.random(W), y = p.random(H);
      const tx = (x/W - 0.5) * 2;
      const ty = (y/H - 0.5) * 2;
      const a = tx * 1.2 + Math.sin(ty*3)*0.3;
      const len = 22;
      p.stroke(y < H/2 ? p.color(40,80,200) : p.color(240,200,40));
      p.line(x - Math.cos(a)*len/2, y - Math.sin(a)*len/2, x + Math.cos(a)*len/2, y + Math.sin(a)*len/2);
    }
  }},
  { strategy: "Abandon normal instruments", draw: (p) => {
    const W = p.width, H = p.height;
    p.noStroke();
    for (let i = 0; i < 300; i++) {
      const x = p.random(W), y = p.random(H);
      const tx = (x/W - 0.5) * 2;
      const ty = (y/H - 0.5) * 2;
      const r = 4 + Math.abs(tx * 12) + Math.abs(Math.sin(ty*3)*6);
      p.fill(y < H/2 ? p.color(40,80,200,200) : p.color(240,200,40,220));
      p.circle(x, y, r);
    }
  }},
  { strategy: "Go slowly all the way round the outside", draw: (p) => {
    const W = p.width, H = p.height;
    p.strokeWeight(2);
    for (let i = 0; i < 300; i++) {
      let x, y;
      const side = Math.floor(p.random(4)), band = p.random(0, 80);
      if (side === 0) { x = p.random(W); y = band; }
      else if (side === 1) { x = W - band; y = p.random(H); }
      else if (side === 2) { x = p.random(W); y = H - band; }
      else { x = band; y = p.random(H); }
      const tx = (x/W - 0.5) * 2;
      const ty = (y/H - 0.5) * 2;
      const a = tx * 1.2 + Math.sin(ty*3)*0.3;
      const len = 22;
      p.stroke(y < H/2 ? p.color(40,80,200) : p.color(240,200,40));
      p.line(x - Math.cos(a)*len/2, y - Math.sin(a)*len/2, x + Math.cos(a)*len/2, y + Math.sin(a)*len/2);
    }
  }},
  { strategy: "Voice nags", draw: (p) => {
    const W = p.width, H = p.height;
    const cx = p.random(W*0.2, W*0.8), cy = p.random(H*0.2, H*0.8);
    const w = 120;
    p.strokeWeight(2);
    for (let i = 0; i < 300; i++) {
      const x = cx + p.random(-w, w) + p.random(-w, w);
      const y = cy + p.random(-w, w) + p.random(-w, w);
      const tx = (x/W - 0.5) * 2;
      const ty = (y/H - 0.5) * 2;
      const a = tx * 1.2 + Math.sin(ty*3)*0.3;
      const len = 22;
      p.stroke(y < H/2 ? p.color(40,80,200) : p.color(240,200,40));
      p.line(x - Math.cos(a)*len/2, y - Math.sin(a)*len/2, x + Math.cos(a)*len/2, y + Math.sin(a)*len/2);
    }
  }},
];
</script>
<script src="runner.js"></script>
</body>
</html>
