<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>sol 0.1</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<style>
  body { margin: 0; background: #f6f5f0; font-family: ui-monospace, monospace; color: #111; }
  header { padding: 20px 24px; border-bottom: 1px solid #ddd; display: flex; gap: 6px 16px; align-items: baseline; flex-wrap: wrap; }
  h1 { margin: 0; font-size: 18px; letter-spacing: 0.06em; text-transform: uppercase; }
  .sub { color: #666; font-size: 13px; }
  .sub a { color: #666; }
  .sub a:hover { color: #111; }
  .refs { flex-basis: 100%; font-size: 11px; color: #888; margin-top: 4px; }
  .refs a { color: #888; }
  .refs a:hover { color: #111; }
  button { font: inherit; padding: 4px 10px; cursor: pointer; }
  main { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 18px; padding: 24px; }
  .card { background: #fff; border: 1px solid #ddd; display: flex; flex-direction: column; text-decoration: none; color: inherit; }
  .card:hover { border-color: #888; }
  .preview { aspect-ratio: 1/1; border: 0; border-bottom: 1px solid #eee; background: #fff; width: 100%; display: block; }
  .meta { padding: 12px 14px; }
  .t { font-size: 12px; letter-spacing: 0.08em; text-transform: uppercase; font-weight: 700; margin-bottom: 6px; }
  .i { font-size: 13px; line-height: 1.5; color: #333; }
  @media (max-width: 600px) {
    h1 { font-size: 20px; }
    .sub { font-size: 15px; }
    .refs { font-size: 13px; }
    .t { font-size: 13px; }
    .i { font-size: 15px; }
  }
</style>
</head>
<body>
<header>
  <h1>sol 0.1</h1>
  <span class="sub">Drawings after <a href="https://en.wikipedia.org/wiki/Sol_LeWitt" target="_blank" rel="noopener">Sol LeWitt</a>.</span>
  <div class="refs">
    inspired by <a href="https://github.com/wholepixel/solving-sol" target="_blank" rel="noopener">wholepixel/solving-sol</a>
    · <a href="https://en.wikipedia.org/wiki/Oblique_Strategies" target="_blank" rel="noopener">Oblique Strategies</a> by Brian Eno &amp; Peter Schmidt
    · <a href="https://github.com/mmichelli/sol-0.1" target="_blank" rel="noopener">source</a>
  </div>
</header>
<main id="grid"></main>

<script>
const drawings = [
  { num: '001', file: 'drawings/001-migrations.html',           instruction: 'Ten points on the left edge of the page and ten points on the right edge, unevenly spaced; from each left point a red line to a right point, from each right point a blue line to a left point, and at every intersection a small yellow circle.' },
  { num: '002', file: 'drawings/002-grid-bleed.html',           instruction: 'A square divided into a twenty by twenty grid; one cell, chosen at random, is coloured red; each adjacent cell in turn is coloured red or black until no white cells remain.' },
  { num: '003', file: 'drawings/003-flock.html',                instruction: 'Fifty points placed at random on the page; from each point, a path of thirty short segments, each segment\u2019s direction turned slightly from the last.' },
  { num: '004', file: 'drawings/004-four-winds.html',           instruction: 'Forty straight lines from each of the four corners toward the opposite edges; the lines from the upper-left corner red, from the upper-right yellow, from the lower-right blue, from the lower-left black.' },
  { num: '005', file: 'drawings/005-tangents.html',             instruction: 'Fifteen circles of random size, placed at random on the page; the intersection of any two circles is coloured red.' },
  { num: '006', file: 'drawings/006-descent.html',              instruction: 'Eighty horizontal lines across the page, each divided into segments coloured alternately red and blue, each line shifted slightly to the right of the line above.' },
  { num: '007', file: 'drawings/007-shatter.html',              instruction: 'The page divided into four equal squares; one square coloured black; each of the other three divided into four equal squares and treated the same; continuing until the squares are smaller than a fingernail.' },
  { num: '008', file: 'drawings/008-pulse.html',                instruction: 'Forty concentric irregular twelve-sided polygons around the centre of the page, each vertex placed a small random distance outward from the corresponding vertex of the polygon within.' },
  { num: '009', file: 'drawings/009-encounter.html',            instruction: 'A grid of black points and a grid of red points, the red grid rotated and shifted slightly from the black; from each black point a line to its nearest red point.' },
  { num: '010', file: 'drawings/010-drift.html',                instruction: 'Three hundred short line segments placed at random on the page, the angle of each determined by its position; segments in the upper half blue, segments in the lower half yellow.' },
  { num: '011', file: 'drawings/011-bisections.html',           instruction: 'A line drawn across the page at any angle; a second line perpendicular to it, passing through its midpoint; a third perpendicular to the second through its midpoint; continuing for forty lines.' },
  { num: '012', file: 'drawings/012-cut-up.html',               instruction: 'Five words drawn at random from a random encyclopedia article. The five words determine, by the numeric value of their letters, the shapes drawn on the page, their counts, their colours, and their arrangement.' },
  { num: '013', file: 'drawings/013-four-directions.html',      instruction: 'The page divided into a sixteen by sixteen grid. Within each cell, straight lines drawn in one of four directions — vertical, horizontal, diagonal left, diagonal right — the direction of each cell chosen by the toss of a coin.' },
  { num: '014', file: 'drawings/014-arcs-from-corners.html',    instruction: 'Arcs from the four corners of the page and arcs from the midpoints of the four sides, each arc centred on its origin, each radius increasing by an equal step until the arc reaches the opposite edge.' },
  { num: '015', file: 'drawings/015-all-points-connected.html', instruction: 'Fifty points placed at random on the page, evenly distributed. All of the points connected to each other by straight lines.' },
  { num: '016', file: 'drawings/016-ten-thousand-lines.html',   instruction: 'Ten thousand short black lines, each of equal length, each at a random angle, drawn to cover the page evenly.' },
  { num: '017', file: 'drawings/017-nested-cubes.html',         instruction: 'An isometric cube drawn in black lines at the centre of the page. Within it, a smaller isometric cube rotated by a quarter turn. Within that, a smaller still. Continue until the cube is too small to draw.' },
  { num: '018', file: 'drawings/018-four-bands.html',           instruction: 'Four equal horizontal bands across the page. The first band filled with red parallel lines, the second with yellow, the third with blue, the fourth with black. The angle of the lines in each band is chosen by the toss of a coin.' },
  { num: '019', file: 'drawings/019-inscribed-circles.html',    instruction: 'The page divided into a grid of twelve by twelve cells. Within each cell, a circle inscribed; within each circle a second circle, its diameter a random fraction of the first.' },
  { num: '020', file: 'drawings/020-centre-rays.html',          instruction: 'One thousand points placed at random across the page. From the centre of the page, a straight line drawn to each point. The lines are coloured red, yellow, blue, or black; the colour chosen by the toss of a four-sided die.' },
  { num: '021', file: 'drawings/021-recursive-square.html',     instruction: 'A square. Within it, four smaller squares of equal size. Within each smaller square, four smaller squares. Continue until the squares are one eighth of an inch across. The draughtsman may leave any square undivided by chance.' },
  { num: '022', file: 'drawings/022-spindle.html',              instruction: 'A spiral drawn from the centre of the page, completing twenty revolutions outward. Along its length, black dots placed at regular angular intervals, each dot larger than the last.' },
  { num: '023', file: 'drawings/023-clerks-ledger.html',        instruction: 'Two columns, each of one hundred horizontal lines of equal length. The lines on the left column red, those on the right blue. Every tenth line on each side crossed through with a black diagonal.' },
  { num: '024', file: 'drawings/024-palm.html',                 instruction: 'A single vertical line from the top of the page to the bottom. At one hundred points along the line, a short horizontal stroke drawn; the strokes alternate left and right, and their lengths are decided by chance.' },
  { num: '025', file: 'drawings/025-select-committee.html',     instruction: 'One thousand points placed at random on the page. Each point is examined: if the sum of its coordinates is even, enclosed in a small black square; if odd, in a small red square.' },
  { num: '026', file: 'drawings/026-branching.html',            instruction: 'From a single point at the bottom centre of the page, a line rising upward. At random intervals the line divides into two; each branch continuing upward, each branch dividing again. Some branches yellow, others red; the rest black.' },
  { num: '027', file: 'drawings/027-clamshell.html',            instruction: 'The page divided by a vertical line. On the left half, fifty curves drawn at random. On the right half, each curve mirrored across the line.' },
  { num: '028', file: 'drawings/028-twin-settlements.html',     instruction: 'Two points on the horizontal centre line, one quarter of the way in from each edge. From each, fifty concentric arcs expanding outward; where the arcs of one meet the arcs of the other, a small black dot.' },
  { num: '029', file: 'drawings/029-the-net.html',              instruction: 'A rectangle at the centre of the page. Within it, a fine grid forming a net. Outside, sixty straight lines each ending at a random point on the rectangle\u2019s boundary.' },
  { num: '030', file: 'drawings/030-allegory.html',             instruction: 'Seven vertical bars in a row at the bottom of the page, widths chosen at random, heights proportional to the numbers one through seven in an order chosen by the toss of a die, each bar a single colour.' },
  { num: '031', file: 'drawings/031-neo-bharatam.html',         instruction: 'Forty curves drawn across the page at random. For each curve, a second curve of the same length drawn as its mirror image across the vertical axis. Originals red, mirrors blue.' },
  { num: '032', file: 'drawings/032-isopoda.html',              instruction: 'A narrow oval at the centre of the page. From each side of the oval, seven pairs of curving legs; each leg divided into three equal segments, the pairs evenly spaced along the oval\u2019s length.' },
  { num: '033', file: 'drawings/033-gallicanism.html',          instruction: 'A single circle at the centre of the page. Inside it, red rays pushing outward from the centre. Outside, blue rays pushing inward from the edge. Where the two kinds of rays meet at the circumference, a short perpendicular black tick.' },
  { num: '034', file: 'drawings/034-peddle.html',               instruction: 'Twenty small squares placed at random across the page. A single continuous line begins at one square and visits each in turn, always travelling next to the nearest square it has not yet reached, until all have been visited.' },
  { num: '035', file: 'drawings/035-centenary.html',            instruction: 'A ten-by-ten grid; in each of its hundred cells, a short line segment of equal length, set at a random angle. Any cell in ten, chosen at random, is marked instead by a small black square.' },
  { num: '036', file: 'drawings/036-responsory.html',           instruction: 'Thirty pairs of horizontal lines down the page. In each pair, a long call drawn from the left edge and a short answer drawn from the right edge; the answer always half the length of the call. The call black, the answer red.' },
  { num: '037', file: 'drawings/037-carpintero.html',           instruction: 'A grid of twenty by twenty small open circles across the page. In each circle, a smaller filled disc at its centre; the colour chosen at random from black, brown, or empty; roughly one in ten filled with a brown acorn.' },
  { num: '038', file: 'drawings/038-hydrolytic.html',           instruction: 'A single large circle at the centre of the page. Divided into two by a straight line; each half halved again by a perpendicular line; continuing until no piece is wider than a fingernail. Every second piece coloured blue.' },
  { num: '039', file: 'drawings/039-hypotheca.html',            instruction: 'Ten rectangles placed at random on the page. Within each, a smaller rectangle drawn in a second colour; within that, a third smaller rectangle in a third colour; nested three deep.' },
  { num: '040', file: 'drawings/040-nullipore.html',            instruction: 'Twelve irregular closed curves placed at random across the page. Along each curve, a dense fringe of short strokes drawn perpendicular to the curve at regular intervals, bristling outward.' },
  { num: '041', file: 'drawings/041-topiarian.html',            instruction: 'The page filled solid green. From the field, twelve geometric shapes \u2014 circles, triangles, squares \u2014 clipped away, each revealing a single flat colour beneath: red, yellow, blue, or black.' },
  { num: '042', file: 'drawings/042-pleurisy.html',             instruction: 'A twelve-by-twelve grid of squares, filling the page. Each square filled flat: red, orange, or yellow; the colour chosen by the distance of the square from a point of inflammation placed at random.' },
  { num: '043', file: 'drawings/043-succinimide.html',          instruction: 'The page covered without gap by a tessellation of rhombuses. Each rhombus filled flat with one of four colours \u2014 red, yellow, blue, or green \u2014 the colour chosen at random.' },
  { num: '044', file: 'drawings/044-aromatical.html',           instruction: 'From the centre of the page, forty-eight wedges fanning outward to the edge, each wedge filled flat with a single saturated colour. The colours cycle red, yellow, blue, green, black around the page.' },
  { num: '045', file: 'drawings/045-urban.html',                instruction: 'Twenty tall rectangles standing shoulder to shoulder across the page. Each rectangle of a different width and height, each filled a single flat saturated colour from red, yellow, blue, green, or black. Above, the sky is left white.' },
  { num: '046', file: 'drawings/046-trapezium.html',            instruction: 'The page divided by straight cuts into a mosaic of four-sided figures, no two having parallel sides. Each region filled flat with one of four colours: red, yellow, blue, or green.' },
  { num: '047', file: 'drawings/047-four.html',                 instruction: 'The page divided into four equal quadrants; each quadrant into four; each into four; for four levels in all. At each level, each of the four children is filled with one of four colours \u2014 red, yellow, blue, black \u2014 the order rotated from its parent.' },
  { num: '048', file: 'drawings/048-archetypal.html',           instruction: 'At the centre of the page, three primary shapes overlapping: a red circle, a yellow square, a blue triangle. Where any two shapes overlap, a fourth flat colour. Where all three meet, black.' },
  { num: '049', file: 'drawings/049-insinuative.html',          instruction: 'Five broad ribbons stealing across the page, each a different flat saturated colour. Every ribbon begins at one edge of the page and ends at another. Where ribbons cross, each crossing is decided at random.' },
  { num: '050', file: 'drawings/050-carbonaro.html',            instruction: 'The page divided into three equal horizontal bands of flat saturated colour \u2014 red above, yellow in the middle, blue below. Across all three bands, two hundred small black discs scattered at random.' },
  { num: '051', file: 'drawings/051-eloign.html',               instruction: 'Many straight lines drawn at many angles across the page. No line touches any other; where two would meet, the second is drawn shorter, withdrawing before the point of contact.' },
  { num: '052', file: 'drawings/052-tipsy.html',                instruction: 'Sixty lines walking from the left edge of the page to the right. Each line staggers and reels along the way, none holding its course.' },
  { num: '053', file: 'drawings/053-gurgle.html',               instruction: 'One hundred horizontal lines across the page, each broken into short segments with irregular gaps; the pattern of gaps decided fresh for every line.' },
  { num: '054', file: 'drawings/054-multiphase.html',           instruction: 'The page layered four times: parallel vertical lines in red, horizontal in yellow, diagonal-left in blue, diagonal-right in black. Each layer at the same spacing, each shifted by a quarter phase from the one before.' },
  { num: '055', file: 'drawings/055-battering-ram.html',        instruction: 'From the midpoint of each of the four sides, a nested series of arcs swings into the page; each arc centred on its midpoint, each radius a fixed step larger than the last.' },
  { num: '056', file: 'drawings/056-parrotry.html',             instruction: 'Two hundred straight line segments, every segment of exactly the same length. Placed at random across the page, each at a random angle; each segment repeating the length of the first.' },
  { num: '057', file: 'drawings/057-aglet.html',                instruction: 'A single continuous line enters at the upper-left corner and leaves at the lower-right; along its course it passes through itself many times, threading like a lace.' },
  { num: '058', file: 'drawings/058-apex.html',                 instruction: 'A point chosen at random on the page. Every line in the drawing passes through that point; each line extends a different length on either side, terminating before the edge.' },
  { num: '059', file: 'drawings/059-dissolvent.html',           instruction: 'Parallel horizontal lines across the page. The density of lines varies continuously, sparse at the top and dense at the bottom; from a distance the page reads as a grey tone dissolving downward.' },
  { num: '060', file: 'drawings/060-gyre.html',                 instruction: 'The page covered by twenty continuous whirling lines, each beginning at a random point and looping outward in a slow spiral. Three colours \u2014 red, yellow, blue \u2014 one chosen for each whirl.' },
];

const grid = document.getElementById('grid');
for (const d of drawings) {
  const a = document.createElement('a');
  a.className = 'card';
  a.href = d.file;
  a.innerHTML = `
    <img class="preview" src="previews/${d.num}.png" alt="Wall Drawing ${d.num}" loading="lazy">

    <div class="meta">
      <div class="t">#${d.num}</div>
      <div class="i">${d.instruction}</div>
    </div>
  `;
  grid.appendChild(a);
}
</script>
</body>
</html>
